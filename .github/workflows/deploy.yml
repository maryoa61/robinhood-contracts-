name: Deploy Contract
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Build Contract
        run: |
          rm -f src/HelloRobinhood.sol
          forge build
      - name: Deploy Contract
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          RPC_URL: https://rpc.testnet.chain.robinhood.com/
        run: forge create ./src/MySwapper.sol:MySwapper --rpc-url $RPC_URL --private-key $PRIVATE_KEY --constructor-args 0x77bF00A6A90c600f214b34BAFBB7918c0cF113A8 --broadcast
